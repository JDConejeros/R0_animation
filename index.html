<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>R₀ — Basic Reproduction Number | Propagation Simulation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0d1117;
      --bg-card: #161b22;
      --bg-card-hover: #21262d;
      --border: #30363d;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --accent: #3fb950;
      --accent-dim: #238636;
      --susceptible: #21262d;
      --infected: #3fb950;
      --infected-glow: rgba(63, 185, 80, 0.4);
      --danger: #f85149;
      --warning: #d29922;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.5;
    }

    header {
      padding: 2rem 2rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, var(--bg-dark) 0%, transparent 100%);
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    .source {
      margin-top: 0.75rem;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .source a {
      color: var(--accent);
      text-decoration: none;
    }

    .source a:hover {
      text-decoration: underline;
    }

    main {
      padding: 2rem;
      max-width: 1600px;
      margin: 0 auto;
    }

    .legend {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
      padding: 0.75rem 1rem;
      background: var(--bg-card);
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 0.85rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .legend-dot.susceptible { background: var(--susceptible); border: 1px solid var(--border); }
    .legend-dot.infected { background: var(--infected); box-shadow: 0 0 8px var(--infected-glow); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.25rem;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      border-color: var(--accent-dim);
      box-shadow: 0 0 0 1px var(--accent-dim);
    }

    .card-header {
      padding: 1rem 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.2);
    }

    .card-title {
      font-weight: 700;
      font-size: 1.1rem;
    }

    .r0-badge {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
      font-size: 1rem;
      padding: 0.25rem 0.5rem;
      background: var(--accent-dim);
      color: white;
      border-radius: 6px;
    }

    .card-canvas {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      background: #0d1117;
    }

    .card-canvas canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .card-final-overlay {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(13, 17, 23, 0.92);
      color: var(--accent);
      font-size: 2.5rem;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
    }

    .card-final-overlay.visible {
      display: flex;
    }


    .card-footer {
      padding: 0.75rem 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.95rem;
      color: var(--text-secondary);
      border-top: 1px solid var(--border);
    }

    .day-counter {
      font-family: 'JetBrains Mono', monospace;
    }

    .infected-count {
      color: var(--infected);
      font-weight: 500;
    }

    .hit-badge {
      font-size: 0.85rem;
      color: var(--text-secondary);
      opacity: 0.8;
    }

    .btn-restart {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }

    .btn-restart:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .controls {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
  </style>
</head>
<body>
  <header>
    <h1>R₀ — Basic Reproduction Number</h1>
    <p class="subtitle">Propagation simulation in a community of 100 people — first 10 days after outbreak onset</p>
    <p class="source">Data: <a href="https://en.wikipedia.org/wiki/Basic_reproduction_number" target="_blank" rel="noopener">Wikipedia - Basic reproduction number</a></p>
  </header>

  <main>
    <div class="legend">
      <div class="legend-item">
        <span class="legend-dot susceptible"></span>
        <span>Susceptible</span>
      </div>
      <div class="legend-item">
        <span class="legend-dot infected"></span>
        <span>Infected</span>
      </div>
    </div>

    <div class="grid" id="grid"></div>
  </main>

  <script>
    function parseR0Midpoint(r0Display, baseR0) {
      const m = r0Display.match(/^(\d+\.?\d*)\s*[–-]\s*(\d+\.?\d*)$/);
      return m ? (parseFloat(m[1]) + parseFloat(m[2])) / 2 : baseR0;
    }
    const DISEASES_RAW = [
      { name: "Measles", r0: 15, r0_display: "12–18", hit: "92–94%" },
      { name: "Pertussis", r0: 14.5, r0_display: "12–17", hit: "92–94%" },
      { name: "Chickenpox", r0: 11, r0_display: "10–12", hit: "90–92%" },
      { name: "Mumps", r0: 11, r0_display: "10–12", hit: "90–92%" },
      { name: "Norovirus", r0: 7.2, r0_display: "7.2", hit: "86%" },
      { name: "Rubella", r0: 6.5, r0_display: "6–7", hit: "83–86%" },
      { name: "Polio", r0: 6, r0_display: "5–7", hit: "80–86%" },
      { name: "Smallpox", r0: 4.75, r0_display: "3.5–6.0", hit: "71–83%" },
      { name: "HIV/AIDS", r0: 3.5, r0_display: "2–5", hit: "50–80%" },
      { name: "SARS", r0: 3, r0_display: "2–4", hit: "50–75%" },
      { name: "Diphtheria", r0: 2.6, r0_display: "2.6", hit: "62%" },
      { name: "Common cold", r0: 2.5, r0_display: "2–3", hit: "50–67%" },
      { name: "COVID-19", r0: 11.45, r0_display: "2.9–20", hit: "65–95%" },
      { name: "Mpox", r0: 2.1, r0_display: "2.1", hit: "53%" },
      { name: "Ebola", r0: 1.8, r0_display: "1.8", hit: "44%" },
      { name: "Influenza", r0: 1.3, r0_display: "1.3", hit: "23%" },
      { name: "Andes hantavirus", r0: 1.2, r0_display: "1.2", hit: "16%" },
      { name: "Nipah virus", r0: 0.5, r0_display: "0.5", hit: "0%" },
      { name: "MERS", r0: 0.5, r0_display: "0.5", hit: "0%" }
    ];
    const DISEASES = DISEASES_RAW.map(d => ({ ...d, r0: parseR0Midpoint(d.r0_display, d.r0) }));

    const POPULATION = 100;
    const DAYS = 10;
    const STEPS_PER_DAY = 20;
    const TOTAL_STEPS = DAYS * STEPS_PER_DAY;
    const INFECTIOUS_PERIOD = 5 * STEPS_PER_DAY;
    const CONTACT_RADIUS = 0.1;
    const SPEED = 0.018;
    const AVG_CONTACTS = 6;
    const AGENT_RADIUS = 0.022;

    function createSimulation(r0) {
      const transmissionProb = Math.min(0.85, r0 / (INFECTIOUS_PERIOD * AVG_CONTACTS));
      const agents = [];
      for (let i = 0; i < POPULATION; i++) {
        agents.push({
          x: Math.random(),
          y: Math.random(),
          vx: (Math.random() - 0.5) * 2 * SPEED,
          vy: (Math.random() - 0.5) * 2 * SPEED,
          state: i === 0 ? 'infected' : 'susceptible',
          infectedAt: i === 0 ? 0 : -1
        });
      }
      return { agents, transmissionProb };
    }

    function resolveCollisions(agents) {
      const r2 = AGENT_RADIUS * 2;
      const r2Sq = r2 * r2;
      for (let i = 0; i < agents.length; i++) {
        for (let j = i + 1; j < agents.length; j++) {
          const a = agents[i], b = agents[j];
          const dx = b.x - a.x, dy = b.y - a.y;
          const distSq = dx * dx + dy * dy;
          if (distSq < r2Sq && distSq > 1e-10) {
            const dist = Math.sqrt(distSq);
            const nx = dx / dist, ny = dy / dist;
            const overlap = r2 - dist;
            a.x -= overlap * 0.5 * nx;
            a.y -= overlap * 0.5 * ny;
            b.x += overlap * 0.5 * nx;
            b.y += overlap * 0.5 * ny;
            const v1n = a.vx * nx + a.vy * ny;
            const v2n = b.vx * nx + b.vy * ny;
            a.vx += (v2n - v1n) * nx;
            a.vy += (v2n - v1n) * ny;
            b.vx += (v1n - v2n) * nx;
            b.vy += (v1n - v2n) * ny;
          }
        }
      }
    }

    function stepSimulation(sim) {
      const { agents, transmissionProb } = sim;
      const infected = agents.filter(a => a.state === 'infected');

      for (const a of agents) {
        a.x += a.vx;
        a.y += a.vy;
        if (a.x <= 0 || a.x >= 1) a.vx *= -1;
        if (a.y <= 0 || a.y >= 1) a.vy *= -1;
        a.x = Math.max(0, Math.min(1, a.x));
        a.y = Math.max(0, Math.min(1, a.y));
      }
      resolveCollisions(agents);

      for (const inf of infected) {
        for (const a of agents) {
          if (a.state !== 'susceptible') continue;
          const dx = a.x - inf.x;
          const dy = a.y - inf.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < CONTACT_RADIUS && Math.random() < transmissionProb) {
            a.state = 'infected';
            a.infectedAt = 0;
          }
        }
      }

      for (const a of agents) {
        if (a.state === 'infected' && a.infectedAt >= 0) {
          a.infectedAt++;
          if (a.infectedAt > INFECTIOUS_PERIOD) {
            a.state = 'recovered';
          }
        }
      }

      const infectedCount = agents.filter(a => a.state === 'infected').length;
      const totalEverInfected = agents.filter(a => a.state !== 'susceptible').length;
      return { infectedCount, totalEverInfected };
    }

    function drawFrame(ctx, agents, width, height) {
      ctx.fillStyle = '#0d1117';
      ctx.fillRect(0, 0, width, height);

      const scale = Math.min(width, height);
      const pad = 4;

      for (const a of agents) {
        const x = pad + a.x * (scale - 2 * pad);
        const y = pad + a.y * (scale - 2 * pad);
        const r = 2.5;

        if (a.state === 'susceptible') {
          ctx.fillStyle = '#21262d';
          ctx.strokeStyle = '#30363d';
          ctx.lineWidth = 0.5;
        } else if (a.state === 'infected') {
          ctx.fillStyle = '#3fb950';
          ctx.strokeStyle = 'rgba(63, 185, 80, 0.7)';
        } else {
          ctx.fillStyle = '#484f58';
          ctx.strokeStyle = '#30363d';
        }

        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
      }
    }

    const simulations = [];
    let globalAnimationId;
    const TICK_MS = 48;

    function runSimulation(disease, container) {
      const sim = createSimulation(disease.r0);
      const canvas = container.querySelector('canvas');
      const ctx = canvas.getContext('2d');
      const dayEl = container.querySelector('.day-counter');
      const countEl = container.querySelector('.infected-count');
      const dpr = Math.min(2, window.devicePixelRatio || 1);

      const state = { step: 0 };
      const overlay = container.querySelector('.card-final-overlay');
      const finalCountEl = container.querySelector('.final-count');

      function resize() {
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function tick() {
        if (state.step >= TOTAL_STEPS) return;
        const { infectedCount, totalEverInfected } = stepSimulation(sim);
        state.step++;
        const day = Math.floor(state.step / STEPS_PER_DAY);
        dayEl.textContent = `Day ${day}/${DAYS}`;
        countEl.textContent = `${infectedCount} infected`;
        drawFrame(ctx, sim.agents, canvas.width / dpr, canvas.height / dpr);
        if (state.step >= TOTAL_STEPS) {
          finalCountEl.textContent = totalEverInfected;
          overlay.classList.add('visible');
        }
      }

      function start() {
        const newSim = createSimulation(disease.r0);
        sim.agents.length = 0;
        sim.agents.push(...newSim.agents);
        sim.transmissionProb = newSim.transmissionProb;
        state.step = 0;
        overlay.classList.remove('visible');
        dayEl.textContent = `Day 0/${DAYS}`;
        countEl.textContent = '1 infected';
        drawFrame(ctx, sim.agents, canvas.width / dpr, canvas.height / dpr);
      }

      simulations.push({ tick, start, getStep: () => state.step });
      resize();
      window.addEventListener('resize', resize);
      container.querySelector('.btn-restart').onclick = () => {
        start();
        if (!globalAnimationId && simulations.some(e => e.getStep() < TOTAL_STEPS)) {
          globalAnimate.lastTs = 0;
          globalAnimationId = requestAnimationFrame(globalAnimate);
        }
      };
      start();
    }

    function globalAnimate(timestamp) {
      const last = globalAnimate.lastTs ?? 0;
      if (timestamp - last >= TICK_MS) {
        globalAnimate.lastTs = timestamp;
        let anyActive = false;
        for (const e of simulations) {
          if (e.getStep() < TOTAL_STEPS) {
            e.tick();
            anyActive = true;
          }
        }
        if (!anyActive) globalAnimationId = null;
      }
      if (simulations.some(e => e.getStep() < TOTAL_STEPS)) {
        globalAnimationId = requestAnimationFrame(globalAnimate);
      }
    }

    const grid = document.getElementById('grid');
    DISEASES.forEach((d, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-header">
          <span class="card-title">${d.name}</span>
          <span class="r0-badge">R₀ = ${d.r0_display}</span>
        </div>
        <div class="card-canvas">
          <canvas></canvas>
          <div class="card-final-overlay" aria-hidden="true">
            <span class="final-count">0</span>
          </div>
        </div>
        <div class="card-footer">
          <div class="controls">
            <span class="day-counter">Day 0/${DAYS}</span>
            <span class="infected-count">1 infected</span>
            <span class="hit-badge">HIT ${d.hit}</span>
          </div>
          <button class="btn-restart">Restart</button>
        </div>
      `;
      grid.appendChild(card);
      setTimeout(() => {
        runSimulation(d, card);
        if (!globalAnimationId) {
          globalAnimate.lastTs = 0;
          globalAnimationId = requestAnimationFrame(globalAnimate);
        }
      }, i * 60);
    });
  </script>
</body>
</html>
